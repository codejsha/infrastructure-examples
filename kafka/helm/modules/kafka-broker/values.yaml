clusterId: "clusterlocal"

config: {}

log4j2: ""

heapOpts: -XX:InitialRAMPercentage=75 -XX:MaxRAMPercentage=75

listeners:
  client:
    containerPort: 9092
    protocol: SASL_PLAINTEXT
    name: CLIENT
    sslClientAuth: ""
  controller:
    containerPort: 9093
    protocol: SASL_PLAINTEXT
    name: CONTROLLER
    sslClientAuth: ""
  interbroker:
    containerPort: 9094
    protocol: SASL_PLAINTEXT
    name: INTERNAL
    sslClientAuth: ""
  external:
    containerPort: 9095
    protocol: SASL_PLAINTEXT
    name: EXTERNAL
    sslClientAuth: ""

  extraListeners: []
  overrideListeners: ""
  advertisedListeners: ""
  securityProtocolMap: ""

sasl:
  enabledMechanisms: PLAIN
  interBrokerMechanism: PLAIN
  controllerMechanism: PLAIN

controller:
  replicaCount: 3
  controllerOnly: false
  config: {}
  heapOpts: -Xmx1024m -Xms1024m
  resources:
    requests:
      cpu: 10m
      memory: 1024Mi
    limits:
      cpu: 750m
      memory: 1536Mi
  automountServiceAccountToken: true
  podAnnotations: {}
  persistence:
    enabled: true
    size: 1000Gi
  logPersistence:
    enabled: false
    size: 100Gi

# broker:
#   replicaCount: 0
#   config: {}
#   heapOpts: -Xmx1024m -Xms1024m
#   resources:
#     requests:
#       cpu: 10m
